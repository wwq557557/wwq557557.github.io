<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字展销平台</title>
    <link type="text/css" rel="stylesheet" href="css/lab3-2501-022-index.css">
</head>
<body>
<div class="login-modal" id="loginModal">
    <div class="login-box">
        <div class="login-tab">
            <div class="tab-item active" onclick="switchTab('login')">登录</div>
            <div class="tab-item" onclick="switchTab('register')">注册</div>
        </div>

        <div class="form-item" id="loginForm">
            <input type="text" id="loginUser" placeholder="请输入用户名" class="input-control">
            <input type="password" id="loginPwd" placeholder="请输入密码" class="input-control">
            <button class="btn-submit" onclick="userLogin()">登录</button>
            <p class="tip" id="loginTip"></p>
        </div>

        <div class="form-item hidden" id="registerForm">
            <input type="text" id="regUser" placeholder="请设置用户名" class="input-control">
            <input type="password" id="regPwd" placeholder="请设置密码" class="input-control">
            <button class="btn-submit" onclick="userRegister()">注册</button>
            <p class="tip" id="regTip"></p>
        </div>

        <span class="close-btn" onclick="closeLogin()">&times;</span>
    </div>
</div>

<div class="header">
    <div class="logo">
        <img src="img/83025aafa40f4bfbfbedc2cf73196ff0f736aec3b2a8.png" alt="平台logo">
    </div>
    <div class="menu">
        <ul>
            <li><a href="javascript:openLogin()">用户登录</a></li>
            <li><a href="#display">图书展示</a></li>
            <li><a href="#recommendation">图书推荐</a></li>
            <li><a href="#launch">图书上市</a></li>
        </ul>
    </div>
</div>

<div class="container">
    <div class="classification">
        <ul>
            <li><a href="#fiction">文学小说</a></li>
            <li><a href="#computer">计算机技术</a></li>
            <li><a href="#economic">经管励志</a></li>
            <li><a href="#cartoon">少儿读物</a></li>
            <li><a href="#life">生活艺术</a></li>
            <li><a href="#science">科技科普</a></li>
        </ul>
    </div>

    <div class="middle">
        <div id="display" class="book-show">
            <h3>精品图书展示</h3>
            <div class="show-list">
                <div class="show-item item-first">
                    <img src="img/t017359e36229e509b5.jpg" alt="图书封面">
                    <div class="item-hover-tip">点击查看详情</div>
                </div>
                <div class="show-item"><img src="img/t015e3fae725cf8a101.jpg" alt="图书封面"></div>
                <div class="show-item"><img src="img/t019bf2db4fe90f8cf0.png" alt="图书封面"></div>
                <div class="show-item"><img src="img/t01611e85122cfa812b.jpg" alt="图书封面"></div>
            </div>
        </div>

        <div id="recommendation" class="hot-recommend">
            <h3>热门推荐</h3>
            <div class="hot-list">
                <div class="hot-item">热门书籍1</div>
                <div class="hot-item">热门书籍2</div>
                <div class="hot-item">热门书籍3</div>
                <div class="hot-item">热门书籍4</div>
                <div class="hot-item">热门书籍5</div>
            </div>
        </div>

        <div id="launch" class="new-book">
            <h3>新书上市</h3>
            <table>
                <tr>
                    <th>书名</th><th>作者</th><th>分类</th><th>上市时间</th>
                </tr>
                <tr><td>前端开发实战</td><td>张三</td><td>计算机</td><td>2026-04</td></tr>
                <tr><td>散文精选集</td><td>李四</td><td>文学小说</td><td>2026-04</td></tr>
                <tr><td>理财入门</td><td>王五</td><td>经管励志</td><td>2026-04</td></tr>
            </table>
        </div>
    </div>

    <div class="right-ad">
        <h4>限时促销</h4>
        <p>全场图书满减活动</p>
        <p>新人首单包邮</p>
    </div>
</div>

<script>

function switchTab(type) {
    document.getElementById('loginForm').classList.toggle('hidden', type !== 'login');
    document.getElementById('registerForm').classList.toggle('hidden', type !== 'register');
    let items = document.querySelectorAll('.tab-item');
    items[0].classList.toggle('active', type === 'login');
    items[1].classList.toggle('active', type === 'register');
}

function openLogin() {
    document.getElementById('loginModal').style.display = 'flex';
}

function closeLogin() {
    document.getElementById('loginModal').style.display = 'none';
    document.getElementById('loginTip').innerText = '';
    document.getElementById('regTip').innerText = '';
}

function userRegister() {
    let user = document.getElementById('regUser').value.trim();
    let pwd = document.getElementById('regPwd').value.trim();
    if (!user || !pwd) {
        document.getElementById('regTip').innerText = '用户名和密码不能为空！';
        return;
    }
    localStorage.setItem('user', user);
    localStorage.setItem('pwd', pwd);
    document.getElementById('regTip').innerText = '注册成功！请登录';
    setTimeout(() => switchTab('login'), 1000);
}

function userLogin() {
    let user = document.getElementById('loginUser').value.trim();
    let pwd = document.getElementById('loginPwd').value.trim();
    let localUser = localStorage.getItem('user');
    let localPwd = localStorage.getItem('pwd');

    if (user === localUser && pwd === localPwd) {
        document.getElementById('loginTip').innerText = '登录成功！';
        setTimeout(closeLogin, 1000);
    } else {
        document.getElementById('loginTip').innerText = '用户名或密码错误';
    }
}
</script>

</body>
</html>
